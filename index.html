	<h3>全国省份热力地图</h3>

	<!-- 自定义单位输入框 -->
	<div class="set-row">
		<label>数据单位（例如：K、万、件）</label>
		<input id="unitInput" value="K" placeholder="自定义数值单位">

		</thead>

			<tr><td><input value="山东"></td><td><input type="number" value="1200"></td></tr>
			<tr><td><input value="新疆"></td><td><input type="number" value="800"></td></tr>

<!-- 外部渲染配置JS -->
<script src="./chart-render.js"></script>
<!-- 页面交互逻辑 -->
<script>
const chartDom = document.getElementById('mapChart');
const myChart = echarts.init(chartDom);

document.getElementById('addRow').onclick = ()=>{
	const tr = document.createElement('tr');
	tr.innerHTML = `
		<td><input placeholder="输入省/市名称"></td>
		<td><input type="number" placeholder="数值"></td>
	`;
	document.getElementById('tableBody').appendChild(tr);
}

document.getElementById('renderChart').onclick = ()=>{
	// 获取自定义单位
	const unit = document.getElementById('unitInput').value.trim() || "";
	const trList = document.querySelectorAll('#tableBody tr');
	const data = [];
	let maxVal = 0;
	trList.forEach(tr=>{
		const inputs = tr.querySelectorAll('input');
		const name = inputs[0].value.trim();
		const val = Number(inputs[1].value);
		if(name && !isNaN(val)){
			data.push({name, value:val});
			if(val > maxVal) maxVal = val;
		}
	})
	if(data.length === 0){
		alert("请填写至少一条省份数据");
		return;
	}
	const option = getChartOption(data, maxVal, unit);
	myChart.setOption(option);
}

window.addEventListener('resize',()=>myChart.resize());
</script>

<!-- 留言板模块 -->
<section id="message">
  <div class="container fade-box">
	<h2 class="section-title">留言板</h2>
	<div class="msg-board">
	  <!-- 发布留言区域 -->
	  <div class="publishing-box">
		<textarea id="msgText" placeholder="请输入留言内容..."></textarea>
		<button id="sendBtn">提交留言</button>
		<h3 class="list-title">留言列表</h3>
		<textarea id="msgText1" readonly placeholder="留言列表展示"></textarea>
	  </div>
	</div>
  </div>
</section>

<script>
window.addEventListener('load', function() {
  const inputBox = document.getElementById('msgText');
  const outputBox = document.getElementById('msgText1');
  const submitBtn = document.getElementById('sendBtn');

  submitBtn.onclick = function() {
	const content = inputBox.value.trim();
	if (!content) {
	  alert('留言内容不能为空！');
	  return;
	}

	const now = new Date().toLocaleString();
	const newMsg = `【${now}】\n${content}\n——————————————\n`;
	outputBox.value = newMsg + outputBox.value;

	inputBox.value = '';
  }
});
</script>
